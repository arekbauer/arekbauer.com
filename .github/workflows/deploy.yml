name: Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Validate Django Project
        env:
          DJANGO_SETTINGS_MODULE: "Personal_Portfolio.test_settings"
          SECRET_KEY: "django-dummy-key"
          SPOTIFY_CLIENT_ID: "test-client-id"
          SPOTIFY_CLIENT_SECRET: "test-client-secret"
          SPOTIFY_REFRESH_TOKEN: "test-refresh-token"
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python manage.py collectstatic --noinput

      - name: Run Django Tests
        env:
          DJANGO_SETTINGS_MODULE: "Personal_Portfolio.test_settings"
          SECRET_KEY: "django-dummy-key"
          SPOTIFY_CLIENT_ID: "test-client-id"
          SPOTIFY_CLIENT_SECRET: "test-client-secret"
          SPOTIFY_REFRESH_TOKEN: "test-refresh-token"
        run: python manage.py test --verbosity 2

      - name: Run JavaScript Tests
        run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: MiguelRizzi/pythonanywhere-deploy-ssh@v1.0.0
        with:
          ssh_host: ${{ secrets.PA_HOST }}
          username: ${{ secrets.PA_USERNAME }}
          ssh_private_key: ${{ secrets.PA_SSH_PRIVATE_KEY }}
          working_directory: ${{ secrets.PA_WORKING_DIRECTORY }}
          venv_directory: ${{ secrets.PA_VENV_DIRECTORY }}
          wsgi_file: ${{ secrets.PA_WSGI_PATH }}
